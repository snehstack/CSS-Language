<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax & Gradient Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="parallax">
        <h2>Welcome to the Parallax World</h2>
    </div>

    <div class="section linear">
        Linear Gradient Section
    </div>

    <div class="section radial">
        Radial Gradient Section
    </div>

    <div class="section conic">
        Conic Gradient Section
    </div>

    <div class="text-box">
        This block uses two classes:
        <span class="highlight">text-block</span> and
        <span class="highlight">highlight</span>.
    </div>

    <div class="parent">
        <h3>Parent Box Heading</h3>
        <p>This paragraph is a child element styled inside the parent.</p>
    </div>

</div>

</body>
</html>
